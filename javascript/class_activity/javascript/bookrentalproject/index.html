
<!DOCTYPE html>
<html>
<head>
  <title>Book Renting System</title>

  <style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f7f9f9, #ACB6E5);
    text-align: center;
    margin: 0;
    padding: 0;
  }

  h1 {
    color: #f80909;
    margin-top: 20px;
    font-size: 36px;
  }

  h1 {
    color: #ee0e0e;
  }

  input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    width: 200px;
  }

  button {
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #4CAF50;
    color: white;
    transition: 0.3s;
  }

  button:hover {
    background: #45a049;
    transform: scale(1.05);
  }

  #bookList {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .book {
    background: rgba(184, 243, 248, 0.2);
    backdrop-filter: blur(10px);
    padding: 20px;
    margin: 15px;
    width: 320px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: transform 0.3s;
  }

  .book:hover {
    transform: translateY(-5px);
  }

  .book h3 {
    margin-bottom: 10px;
  }

  .available {
    color: #0515f5;
    font-weight: bold;
  }

  .rented {
    color: #c41212;
    font-weight: bold;
  }

  #message {
    margin-top: 20px;
    font-size: 18px;
    color: #a20606;
    font-weight: bold;
  }
</style>
</head>

<body>

<h1> Book Renting System</h1>


<h2>Add New Book</h2>
<input type="text" id="bookName" placeholder="Enter book name">
<button onclick="addBook()">Add Book</button>


<h2>Available Books</h2>
<div id="bookList"></div>

<p id="message"></p>

<script src="script.js"></script>

</body>
</html>
