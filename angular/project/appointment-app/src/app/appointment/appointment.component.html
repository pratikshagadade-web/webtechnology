<div class="container">

  <h2>Book Appointment</h2>

  <input type="text" [(ngModel)]="name" placeholder="Enter Name" />
  <input type="date" [(ngModel)]="date" />
  <input type="time" [(ngModel)]="time" />

  <button (click)="addAppointment()">Book</button>

  <h3>Appointments</h3>

  <ul>
    <li *ngFor="let app of appointments; let i = index">
      {{ app.name }} | {{ app.date }} | {{ app.time }}
      <button (click)="deleteAppointment(i)">Delete</button>
    </li>
  </ul>

</div>
