<h2>Add Student</h2>

<form (ngSubmit)="addStudent()">
  <label>Name:</label><br>
  <input type="text" [(ngModel)]="student.name" name="name" required><br><br>

  <label>Age:</label><br>
  <input type="number" [(ngModel)]="student.age" name="age" required><br><br>

  <button type="submit">Add Student</button>
</form>
